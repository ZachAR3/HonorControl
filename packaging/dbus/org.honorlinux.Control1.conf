<?xml version="1.0" encoding="UTF-8" ?>
<!--
  D-Bus system bus policy for the Honor Control backend.

  * Only root may own the org.honorlinux.Control1 name.
  * Any logged-in user may *talk* to the service and call its methods.
    Fine-grained authorisation (who may actually write hardware state)
    is enforced by polkit — see
    packaging/polkit/org.honorlinux.control.policy.
-->
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

  <!-- Only root can register the service name. -->
  <policy user="root">
    <allow own="org.honorlinux.Control1"/>
  </policy>

  <!-- Any local user can talk to the service; polkit gates the writes. -->
  <policy context="default">
    <allow send_destination="org.honorlinux.Control1"/>
    <allow send_destination="org.honorlinux.Control1"
           send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_destination="org.honorlinux.Control1"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow send_destination="org.honorlinux.Control1"
           send_interface="org.honorlinux.Control1"/>
  </policy>

</busconfig>
